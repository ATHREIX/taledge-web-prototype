# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# App Hosting builds this Next.js app (SSR + API routes) on Cloud Run. It reads
# this file at build + runtime. Two kinds of config below:
#   - env with `value:`  -> plaintext, safe to commit (public config, non-secret)
#   - env with `secret:` -> pulled from Cloud Secret Manager at runtime (never in git)
#
# NEXT_PUBLIC_* vars are baked into the client bundle, so they MUST have
# availability BUILD (and RUNTIME so server code can read them too).
#
# Set secrets once with:
#   firebase apphosting:secrets:set GEMINI_API_KEY
# then grant the backend access when prompted. Repeat per secret name below.

runConfig:
  # Interview endpoints can run ~60s (Gemini live/turn). Cloud Run default request
  # timeout is 300s, so no override needed. Tune instances to expected load.
  # Warm floor of 1 so the FIRST interview after idle doesn't pay a cold container
  # boot + firebase-admin init (matters for timed assessments). Raise before a
  # scheduled 100-candidate window so scale-up latency doesn't bite the first wave.
  minInstances: 1
  maxInstances: 100
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # ---- Public Firebase web config (client SDK). Fill after creating the NEW
  # project under umerkhan@athreix.com. Safe to commit — these are not secrets. ----
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCFAQm6PaxxvL3JiW8joN_3p6CDJpp01RI"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "int-taledge.firebaseapp.com"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "int-taledge"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "int-taledge.firebasestorage.app"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "428275859645"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:428275859645:web:bd10d2dcbaa5dda043b7d4"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-461LNPS6Q7"
    availability: [BUILD, RUNTIME]

  # ---- Public feature flags (non-secret) ----
  - variable: NEXT_PUBLIC_AUTH_ENFORCED
    value: "true"
    availability: [BUILD, RUNTIME]
  # Licensed DNLA provider integration. FALSE = the candidate DNLA page shows only
  # the clearly-labelled sample profile (no "Start assessment" CTA that would
  # dead-end on 503 while the provider's account is inactive). Flip to "true" once
  # the DNLA partner API is activated AND the DNLA_API_KEY secret is enabled below.
  - variable: NEXT_PUBLIC_DNLA_ENABLED
    value: "false"
    availability: [BUILD, RUNTIME]
  # Server-side auth enforcement: requires a valid Firebase ID token on every
  # API route and scopes each user to their uid. Firestore admin runs via ADC
  # (see firebase-admin.ts). Keep in sync with NEXT_PUBLIC_AUTH_ENFORCED.
  - variable: AUTH_ENFORCED
    value: "true"
    availability: [BUILD, RUNTIME]
  # Pilot escape hatch: enable the Gemini Live interviewer in enforced/production
  # mode. Without this, AUTH_ENFORCED=true disables the Live path (DEMO_MODE off).
  # TRADE-OFF: hands GEMINI_API_KEY to logged-in, rate-limited browsers. Accepted
  # for a controlled pilot; replace with a server-side WS proxy before open public
  # launch. Set to "false" to disable Live interviews.
  - variable: LIVE_INTERVIEW_ENABLED
    value: "true"
    availability: [RUNTIME]

  # ---- Server-side non-secret config ----
  # Gemini model ids. Pinned explicitly (they otherwise default in lib/gemini.ts)
  # so ops can retune without a code deploy. OPS: the browser opens the Live
  # WebSocket directly against GEMINI_LIVE_MODEL with the project's GEMINI_API_KEY
  # (hooks/useGeminiLive.ts). If a Live interview fails to connect, VERIFY this
  # model id is enabled for the int-taledge key (an unknown/disabled id closes the
  # setup socket before setupComplete and the interview cannot start).
  - variable: GEMINI_LIVE_MODEL
    value: "gemini-3.1-flash-live-preview"
    availability: [RUNTIME]
  - variable: DNLA_API_BASE
    value: "https://backend.dnla.com"
    availability: [RUNTIME]
  - variable: DNLA_AREA
    value: "ESK"
    availability: [RUNTIME]
  - variable: DNLA_SCALE_MAX
    value: "9"
    availability: [RUNTIME]
  - variable: DNLA_SCALE_HIGHER_IS_BETTER
    value: "true"
    availability: [RUNTIME]

  # ---- Secrets (Cloud Secret Manager). Create each with:
  #        firebase apphosting:secrets:set <NAME>
  #      Required for production: GEMINI_API_KEY.
  #      Firestore admin access uses ADC from the attached backend service
  #      account (K_SERVICE runtime) — no FIREBASE_SERVICE_ACCOUNT key needed;
  #      org policy blocks downloading SA keys anyway. Grant that SA the
  #      roles/datastore.user + roles/firebaseauth.admin roles. ----
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability: [RUNTIME]

  # ---- Optional secrets. Uncomment after creating the secret in Secret Manager. ----
  # DNLA partner API key. HELD DEACTIVATED: the secret exists in Cloud Secret
  # Manager and the client wiring is live, but DNLA's /partner-api/tan/create
  # returns HTTP 500 for this key from every context (dev + prod egress) — the
  # partner account/ESK price-model is not activated on DNLA's side yet. Enabling
  # this here makes isDnlaConfigured() true → candidates get a live "Start
  # assessment" button that errors. Re-enable ONLY once a tan/create call returns
  # 200 (or at least a clean 403), then also rotate the key (leaked in plaintext).
  # - variable: DNLA_API_KEY
  #   secret: DNLA_API_KEY
  #   availability: [RUNTIME]
  # DNLA_WEBHOOK_SECRET: create the secret first, THEN uncomment. Until it exists
  # the completion webhook fails closed (rejects all callbacks → results never land).
  # - variable: DNLA_WEBHOOK_SECRET
  #   secret: DNLA_WEBHOOK_SECRET
  #   availability: [RUNTIME]
  # - variable: RESEND_API_KEY
  #   secret: RESEND_API_KEY
  #   availability: [RUNTIME]
  # - variable: PAIZA_API_KEY
  #   secret: PAIZA_API_KEY
  #   availability: [RUNTIME]
  # - variable: GOOGLE_TTS_API_KEY
  #   secret: GOOGLE_TTS_API_KEY
  #   availability: [RUNTIME]
